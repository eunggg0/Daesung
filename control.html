<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="잔량자동처리">
<meta name="theme-color" content="#0a0e16">
<title>잔량자동처리</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { min-height: 100dvh; height: auto; overflow-y: auto; }
  body {
    background: #0a0e16;
    font-family: -apple-system, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; align-items: center;
  }
  body::before {
    content: ''; position: fixed; width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(46,204,138,0.08) 0%, transparent 70%);
    top: -100px; left: 50%; transform: translateX(-50%); pointer-events: none;
  }
  .container {
    width: 100%; max-width: 440px; min-height: 100dvh;
    padding: clamp(10px,3dvh,24px) clamp(12px,4vw,20px) clamp(20px,4dvh,40px);
    display: flex; flex-direction: column; align-items: center;
    gap: clamp(8px,1.5dvh,16px);
  }
  .header { text-align: center; flex-shrink: 0; }
  .header .logo { font-size: 11px; font-weight: 700; letter-spacing: 4px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-bottom: 2px; }
  .header h1 { font-size: clamp(16px,2.5dvh,22px); font-weight: 700; color: rgba(255,255,255,0.9); }
  .conn-bar { display: flex; align-items: center; gap: 6px; font-size: 11px; color: rgba(255,255,255,0.25); }
  .conn-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); }
  .conn-dot.online { background: #2ecc8a; box-shadow: 0 0 6px rgba(46,204,138,0.6); }
  .card {
    width: 100%; flex-shrink: 0;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px; padding: clamp(10px,1.8dvh,18px) clamp(14px,4vw,20px);
    backdrop-filter: blur(20px);
  }
  .card-title { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-bottom: 10px; }
  .config-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .config-label { font-size: 13px; color: rgba(255,255,255,0.6); flex: 1; }
  .config-stepper { display: flex; align-items: center; gap: 6px; }
  .step-btn {
    width: 38px; height: 38px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7); font-size: 17px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .step-btn:active { background: rgba(255,255,255,0.15); transform: scale(0.92); }
  .step-row { display: flex; gap: 4px; }
  .config-input {
    width: 76px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; color: rgba(120,180,255,0.9); font-size: 15px; font-weight: 700;
    font-family: "Menlo","Consolas",monospace; text-align: center; padding: 8px 0; outline: none;
  }
  .config-input:focus { border-color: rgba(46,204,138,0.5); background: rgba(46,204,138,0.06); }
  .btn-primary {
    width: 100%; padding: 14px; border-radius: 14px;
    border: 1px solid rgba(46,204,138,0.3); background: rgba(46,204,138,0.08);
    color: rgba(46,204,138,0.9); font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-primary:active { transform: scale(0.97); background: rgba(46,204,138,0.15); }
  .btn-danger {
    border-color: rgba(255,79,106,0.3); background: rgba(255,79,106,0.08);
    color: rgba(255,79,106,0.9);
  }
  .btn-danger:active { background: rgba(255,79,106,0.15); }
  .cust-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .cust-item:last-child { border-bottom: none; }
  .cust-name { color: #e8ecf2; font-weight: 600; font-size: 14px; }
  .cust-info { color: rgba(255,255,255,0.3); font-size: 11px; margin-top: 2px; }
  .cust-btn {
    padding: 8px 16px; border-radius: 10px; border: 1px solid rgba(46,204,138,0.3);
    background: rgba(46,204,138,0.08); color: #2ecc8a; font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap;
  }
  .cust-btn:active { background: rgba(46,204,138,0.2); }
  .log-card {
    width: 100%; height: 200px; flex-shrink: 0;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px; overflow: hidden; display: flex; flex-direction: column;
  }
  .log-header {
    padding: 8px 16px; border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 10px; font-weight: 700; letter-spacing: 2px; color: rgba(255,255,255,0.25); text-transform: uppercase;
  }
  .log-body { padding: 10px 16px; flex: 1; overflow-y: auto; }
  .log-item { font-size: 12px; color: rgba(255,255,255,0.4); line-height: 1.7; font-family: "Menlo","Consolas",monospace; }
  .log-item span { color: rgba(255,255,255,0.2); margin-right: 6px; }
  .log-item.ok { color: rgba(46,204,138,0.7); }
  .log-item.err { color: rgba(255,79,106,0.7); }
  .toast {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(30,40,60,0.95); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px; padding: 12px 24px; font-size: 14px; font-weight: 600; color: white;
    opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap;
    backdrop-filter: blur(20px); z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">TurnTable ODT</div>
    <h1>잔량 자동처리</h1>
  </div>

  <div class="conn-bar">
    <div class="conn-dot" id="connDot"></div>
    <span id="connText">연결 중...</span>
    <span style="margin-left:12px;" id="procStatus">● 확인 중</span>
  </div>

  <!-- 잔량 설정 -->
  <div class="card">
    <div class="card-title">잔량 범위 설정</div>
    <div class="config-row">
      <span class="config-label">▼ 최소값 (이상)</span>
      <div class="config-stepper">
        <input class="config-input" id="cfgMin" type="number" step="0.1" min="0" value="0.3">
        <div class="step-row">
          <button class="step-btn" onclick="step('cfgMin',-0.1)">−</button>
          <button class="step-btn" onclick="step('cfgMin',0.1)">＋</button>
        </div>
      </div>
    </div>
    <div class="config-row">
      <span class="config-label">▲ 최대값 (이하)</span>
      <div class="config-stepper">
        <input class="config-input" id="cfgMax" type="number" step="1" min="0" value="3.0">
        <div class="step-row">
          <button class="step-btn" onclick="step('cfgMax',-1)">−</button>
          <button class="step-btn" onclick="step('cfgMax',1)">＋</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 거래처 목록 -->
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <div class="card-title" style="margin:0;">거래처 목록</div>
      <button class="step-btn" style="width:auto; padding:0 14px; font-size:12px; height:32px;" onclick="loadList()">새로고침</button>
    </div>
    <div id="custList" style="color:rgba(255,255,255,0.4); font-size:13px;">새로고침을 눌러 목록을 불러오세요</div>
  </div>

  <!-- 전체 처리 -->
  <button class="btn-primary" onclick="processAll()" style="font-size:15px; padding:16px;">
    전체 거래처 잔량 일괄 처리
  </button>

  <!-- 로그 -->
  <div class="log-card">
    <div class="log-header">Activity Log</div>
    <div class="log-body" id="logBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const FIREBASE = "https://daesung-f71ea-default-rtdb.firebaseio.com";

function fb(path) { return `${FIREBASE}/${path}`; }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function showToast(msg, type = "info") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = type === "ok" ? "rgba(46,204,138,0.9)" : type === "err" ? "rgba(255,79,106,0.9)" : "rgba(30,40,60,0.95)";
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

function addLog(msg, type = "") {
  const body = document.getElementById("logBody");
  const now = new Date().toLocaleTimeString("ko-KR", {hour12: false});
  const div = document.createElement("div");
  div.className = "log-item " + type;
  div.innerHTML = `<span>${now}</span>${msg}`;
  body.prepend(div);
  while (body.children.length > 20) body.removeChild(body.lastChild);
}

function step(id, delta) {
  const el = document.getElementById(id);
  const val = Math.round((parseFloat(el.value || 0) + delta) * 10) / 10;
  if (val >= 0) el.value = val.toFixed(1);
}

async function sendDbCmd(cmd, extra = {}) {
  const id = uid();
  try {
    await fetch(fb("db_command.json"), {
      method: "PUT",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ cmd, id, ...extra })
    });
    return id;
  } catch (e) {
    showToast("명령 전송 실패", "err");
    return null;
  }
}

async function waitResult(cmdId, timeout = 10000) {
  const start = Date.now();
  while (Date.now() - start < timeout) {
    try {
      const r = await (await fetch(fb("db_result.json"))).json();
      if (r && r.id === cmdId) return r;
    } catch(e) {}
    await new Promise(ok => setTimeout(ok, 500));
  }
  return null;
}

function getRange() {
  const min = parseFloat(document.getElementById("cfgMin").value) || 0.3;
  const max = parseFloat(document.getElementById("cfgMax").value) || 3.0;
  return { min, max };
}

async function loadList() {
  const el = document.getElementById("custList");
  el.innerHTML = '<div style="color:rgba(255,255,255,0.3)">불러오는 중...</div>';

  const { min, max } = getRange();
  await sendDbCmd("config", { min, max });
  const id = await sendDbCmd("list");
  if (!id) return;

  const result = await waitResult(id);
  if (!result) {
    el.innerHTML = '<div style="color:#ff4f6a">응답 없음 - PC 스크립트 실행 중인지 확인</div>';
    return;
  }
  if (result.error) {
    el.innerHTML = `<div style="color:#ff4f6a">오류: ${result.error}</div>`;
    return;
  }

  const customers = result.customers || [];
  if (!customers.length) {
    el.innerHTML = '<div style="color:rgba(255,255,255,0.4)">처리할 거래처가 없습니다</div>';
    addLog("거래처 0건", "");
    return;
  }

  let totalCnt = 0;
  el.innerHTML = customers.map(c => {
    totalCnt += c.count;
    return `<div class="cust-item">
      <div>
        <div class="cust-name">${c.name}</div>
        <div class="cust-info">${c.count}건 · 잔량합계 ${c.total_jan.toFixed(1)}</div>
      </div>
      <button class="cust-btn" onclick="processOne('${c.code}','${c.name}')">처리</button>
    </div>`;
  }).join('');
  addLog(`거래처 ${customers.length}개, 총 ${totalCnt}건`, "ok");
}

async function processOne(code, name) {
  showToast(`${name} 처리 중...`);
  addLog(`${name} 처리 시작`, "");
  const { min, max } = getRange();
  await sendDbCmd("config", { min, max });
  const id = await sendDbCmd("process_one", { code, name });
  if (!id) return;
  const result = await waitResult(id);
  if (!result) { showToast("응답 없음", "err"); return; }
  if (result.error) { showToast(`오류: ${result.error}`, "err"); return; }
  showToast(`${name} ${result.count}건 완료!`, "ok");
  addLog(`${name} ${result.count}건 처리`, "ok");
  loadList();
}

async function processAll() {
  if (!confirm("전체 거래처 잔량을 일괄 처리할까요?")) return;
  showToast("전체 처리 중...");
  addLog("전체 처리 시작", "");
  const { min, max } = getRange();
  await sendDbCmd("config", { min, max });
  const id = await sendDbCmd("process_all");
  if (!id) return;
  const result = await waitResult(id);
  if (!result) { showToast("응답 없음", "err"); return; }
  if (result.error) { showToast(`오류: ${result.error}`, "err"); return; }
  showToast(`전체 ${result.count}건 완료!`, "ok");
  addLog(`전체 ${result.count}건 처리`, "ok");
  loadList();
}

async function pollStatus() {
  try {
    const pd = await (await fetch(fb("proc_status.json"))).json();
    const now = Math.floor(Date.now() / 1000);
    const alive = pd && pd.status === "on" && pd.ts && (now - pd.ts) < 20;
    document.getElementById("connDot").className = alive ? "conn-dot online" : "conn-dot";
    document.getElementById("connText").textContent = alive ? "PC 연결됨" : "PC 연결 끊김";
    document.getElementById("procStatus").textContent = alive ? "● 실행 중" : "● 종료됨";
    document.getElementById("procStatus").style.color = alive ? "#2ecc8a" : "rgba(255,255,255,0.3)";
  } catch (e) {}
}

addLog("앱 시작", "ok");
pollStatus();
setInterval(pollStatus, 3000);
</script>
</body>
</html>
