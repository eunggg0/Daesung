<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TurnTable">
<meta name="theme-color" content="#f0f4ff">
<link rel="manifest" href="manifest.json">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<title>TurnTable ODT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100dvh;overflow-y:auto}
body{
  background:linear-gradient(180deg,#f0f4ff 0%,#e8edf8 50%,#f5f0ff 100%);
  font-family:'Inter',-apple-system,'Segoe UI',sans-serif;
  color:#1e293b;
  display:flex;flex-direction:column;align-items:center;
}
.app{
  width:100%;max-width:420px;
  padding:16px 16px 40px;
  display:flex;flex-direction:column;gap:12px;
}

/* Header */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 4px;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{
  width:40px;height:40px;border-radius:14px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6,#a855f7);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:900;color:white;
  box-shadow:0 4px 15px rgba(99,102,241,0.35);
}
.brand h1{font-size:16px;font-weight:800;color:#1e293b;letter-spacing:-0.3px;}
.brand span{font-size:10px;font-weight:600;color:#94a3b8;letter-spacing:0.5px;display:block;margin-top:1px;}
.status-pill{
  display:flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:20px;
  background:white;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
  font-size:11px;font-weight:600;color:#94a3b8;
}
.dot{width:7px;height:7px;border-radius:50%;background:#cbd5e1;transition:all 0.3s;}
.dot.on{background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,0.5);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.5}}

/* Cards */
.card{
  background:white;
  border-radius:20px;
  padding:18px;
  box-shadow:0 2px 12px rgba(0,0,0,0.04),0 0 0 1px rgba(0,0,0,0.03);
}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-title{font-size:12px;font-weight:800;letter-spacing:0.5px;color:#6366f1;text-transform:uppercase;}
.card-badge{
  font-size:10px;font-weight:700;padding:4px 10px;border-radius:8px;
  background:linear-gradient(135deg,#ede9fe,#e0e7ff);color:#6366f1;
}

/* Range */
.range-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.range-row:last-child{margin-bottom:0;}
.range-label{flex:1;font-size:13px;font-weight:600;color:#64748b;}
.range-ctrl{display:flex;align-items:center;gap:4px;}
.range-input{
  width:60px;height:38px;border-radius:12px;
  background:#f8fafc;border:2px solid #e2e8f0;
  color:#6366f1;font-size:15px;font-weight:800;font-family:'Inter',monospace;
  text-align:center;outline:none;transition:all 0.2s;
}
.range-input:focus{border-color:#6366f1;background:#f5f3ff;}
.range-btn{
  width:36px;height:36px;border-radius:10px;border:none;
  background:#f1f5f9;color:#64748b;
  font-size:18px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.range-btn:active{background:#e2e8f0;transform:scale(0.9);}

/* Customer List */
.cust-row{
  padding:14px;border-radius:14px;margin-bottom:6px;
  background:#f8fafc;
  transition:all 0.15s;
}
.cust-row:last-child{margin-bottom:0;}
.cust-row:active{background:#f1f5f9;}
.cust-name{font-size:15px;font-weight:700;color:#1e293b;}
.cust-meta{font-size:11px;font-weight:500;color:#94a3b8;margin-top:3px;}
.keep-input{
  width:58px;height:40px;border-radius:12px;
  background:white;border:2px solid #fde68a;
  color:#d97706;font-size:15px;font-weight:700;font-family:'Inter',monospace;
  text-align:center;outline:none;
}
.keep-input:focus{border-color:#f59e0b;background:#fffbeb;}
.keep-input::placeholder{color:#cbd5e1;font-weight:500;font-size:12px;}
.cust-btn{
  height:40px;padding:0 20px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;font-size:14px;font-weight:700;cursor:pointer;
  box-shadow:0 2px 8px rgba(34,197,94,0.3);
  transition:all 0.15s;
}
.cust-btn:active{transform:scale(0.95);box-shadow:0 1px 4px rgba(34,197,94,0.2);}
.cust-btn-off{background:#e2e8f0;color:#94a3b8;box-shadow:none;pointer-events:none;}

/* Actions */
.action-row{display:flex;gap:10px;}
.action-btn{
  flex:1;padding:14px;border-radius:16px;border:none;
  font-size:14px;font-weight:700;cursor:pointer;
  transition:all 0.2s;
}
.action-btn:active{transform:scale(0.97);}
.btn-refresh{
  background:white;color:#64748b;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.btn-refresh:active{background:#f8fafc;}
.btn-process{
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
  box-shadow:0 4px 15px rgba(99,102,241,0.35);
}

/* Log */
.log-wrap{
  background:white;border-radius:18px;overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,0.04);
}
.log-header{
  padding:12px 18px;
  background:linear-gradient(135deg,#f8fafc,#f1f5f9);
  border-bottom:1px solid #e2e8f0;
  font-size:11px;font-weight:800;letter-spacing:1px;color:#6366f1;text-transform:uppercase;
  display:flex;align-items:center;gap:6px;
}
.log-header::before{content:'';width:5px;height:5px;border-radius:50%;background:#6366f1;}
.log-body{
  height:220px;padding:12px 18px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:rgba(0,0,0,0.06) transparent;
}
.log-body::-webkit-scrollbar{width:3px;}
.log-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.08);border-radius:3px;}
.log-line{font-size:11px;font-family:'Inter',monospace;line-height:1.8;color:#94a3b8;}
.log-line .ts{color:#cbd5e1;margin-right:8px;font-size:10px;}
.log-line.ok{color:#16a34a;}
.log-line.err{color:#dc2626;}
.log-line.info{color:#6366f1;}

/* Empty */
.empty{padding:30px 0;text-align:center;font-size:13px;color:#94a3b8;font-weight:500;}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:0.4;}

/* Toast */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);
  padding:12px 24px;border-radius:16px;
  background:white;
  box-shadow:0 8px 30px rgba(0,0,0,0.12);
  font-size:13px;font-weight:700;color:#1e293b;
  opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;z-index:999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{color:#16a34a;border-left:4px solid #22c55e;}
.toast.err{color:#dc2626;border-left:4px solid #ef4444;}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{
  width:18px;height:18px;border:2.5px solid #e2e8f0;
  border-top-color:#6366f1;border-radius:50%;animation:spin 0.6s linear infinite;
  display:inline-block;vertical-align:middle;margin-right:8px;
}

/* Done badge */
.done-badge{
  font-size:10px;font-weight:700;color:#22c55e;
  background:#f0fdf4;padding:4px 10px;border-radius:8px;
  border:1px solid #bbf7d0;
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="brand">
      <div class="brand-icon">T</div>
      <div>
        <h1>TurnTable ODT</h1>
        <span>Gas Management System</span>
      </div>
    </div>
    <div class="status-pill">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">연결 중</span>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">잔량 범위</div>
      <div class="card-badge">FILTER</div>
    </div>
    <div class="range-row">
      <span class="range-label">최소값 (이상)</span>
      <div class="range-ctrl">
        <button class="range-btn" onclick="step('cfgMin',-0.1)">−</button>
        <input class="range-input" id="cfgMin" type="number" step="0.1" min="0" value="0.3">
        <button class="range-btn" onclick="step('cfgMin',0.1)">+</button>
      </div>
    </div>
    <div class="range-row">
      <span class="range-label">최대값 (이하)</span>
      <div class="range-ctrl">
        <button class="range-btn" onclick="step('cfgMax',-1)">−</button>
        <input class="range-input" id="cfgMax" type="number" step="1" min="0" value="3.0">
        <button class="range-btn" onclick="step('cfgMax',1)">+</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">거래처</div>
      <div class="card-badge" id="custCount">—</div>
    </div>
    <div id="custList">
      <div class="empty">목록을 불러오는 중...</div>
    </div>
  </div>

  <div class="action-row">
    <button class="action-btn btn-refresh" onclick="loadList()">🔄 새로고침</button>
    <button class="action-btn btn-process" onclick="processAll()">⚡ 전체 처리</button>
  </div>

  <div class="log-wrap">
    <div class="log-header">Activity Log</div>
    <div class="log-body" id="logBody"></div>
  </div>

</div>
<div id="detailModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;" onclick="if(event.target===this)closeDetail()">
  <div style="background:white;border-radius:20px;width:100%;max-width:400px;max-height:80vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.15);">
    <div style="padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-size:16px;font-weight:800;color:#1e293b;" id="detailTitle">거래처</div>
        <div style="font-size:9px;margin-top:4px;display:flex;gap:8px;color:#94a3b8;">
          <span><b style="color:#6366f1;">■</b> 처리대상</span>
          <span><b style="color:#d97706;">■</b> 범위밖</span>
          <span><b style="color:#dc2626;">■</b> 음수</span>
          <span><b style="color:#94a3b8;">■</b> 잔량0</span>
        </div>
      </div>
      <button onclick="closeDetail()" style="width:32px;height:32px;border:none;background:#f1f5f9;border-radius:10px;font-size:16px;cursor:pointer;color:#64748b;">✕</button>
    </div>
    <div id="detailBody" style="padding:0 16px 12px;overflow-y:auto;max-height:60vh;"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const FB="https://daesung-f71ea-default-rtdb.firebaseio.com";
function fb(p){return FB+"/"+p}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}

function showToast(msg,type){
  var t=document.getElementById("toast");
  t.textContent=msg;
  t.className="toast show"+(type?" "+type:"");
  setTimeout(function(){t.classList.remove("show")},2500);
}

function addLog(msg,type){
  var b=document.getElementById("logBody");
  var now=new Date().toLocaleTimeString("ko-KR",{hour12:false});
  var d=document.createElement("div");
  d.className="log-line "+(type||"");
  d.innerHTML='<span class="ts">'+now+'</span>'+msg;
  b.prepend(d);
  while(b.children.length>30)b.removeChild(b.lastChild);
}

function step(id,delta){
  var el=document.getElementById(id);
  var val=Math.round((parseFloat(el.value||0)+delta)*10)/10;
  if(val>=0)el.value=val.toFixed(1);
}

function sendCmd(cmd,extra){
  var id=uid();
  var data={cmd:cmd,id:id};
  if(extra)for(var k in extra)data[k]=extra[k];
  return fetch(fb("db_queue/"+id+".json"),{
    method:"PUT",headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  }).then(function(){return id}).catch(function(){showToast("전송 실패","err");return null});
}

function waitResult(cmdId,timeout){
  timeout=timeout||10000;
  var start=Date.now();
  return new Promise(function(resolve){
    function poll(){
      if(Date.now()-start>timeout){resolve(null);return}
      fetch(fb("db_result/"+cmdId+".json")).then(function(r){return r.json()}).then(function(r){
        if(r&&r.id===cmdId){
          // 결과 받았으면 삭제
          fetch(fb("db_result/"+cmdId+".json"),{method:"DELETE"}).catch(function(){});
          resolve(r);
        }
        else setTimeout(poll,500);
      }).catch(function(){setTimeout(poll,500)});
    }
    poll();
  });
}

function getRange(){
  return{
    min:parseFloat(document.getElementById("cfgMin").value)||0.3,
    max:parseFloat(document.getElementById("cfgMax").value)||3.0
  };
}

function loadList(){
  var el=document.getElementById("custList");
  var badge=document.getElementById("custCount");
  el.innerHTML='<div class="empty"><div class="spinner"></div>불러오는 중...</div>';
  var rng=getRange();
  sendCmd("list",{min:rng.min,max:rng.max}).then(function(id){
    if(!id)return;
    waitResult(id,15000).then(function(result){
      if(!result){
        el.innerHTML='<div class="empty">PC 응답 없음 — 스크립트 실행 중인지 확인하세요</div>';
        return;
      }
      if(result.error){
        el.innerHTML='<div class="empty" style="color:#dc2626">'+result.error+'</div>';
        return;
      }
      var custs=result.customers||[];
      badge.textContent=custs.length+"개";
      if(!custs.length){
        el.innerHTML='<div class="empty">거래처가 없습니다</div>';
        addLog("거래처 0건","info");
        return;
      }
      var total=0;
      var active=[];
      var done=[];
      for(var i=0;i<custs.length;i++){
        var c=custs[i];
        total+=c.count;
        if(c.count>0) active.push(c);
        else done.push(c);
      }
      function renderRow(c,ht){
        var bottles="";
        if(c.bottles&&c.bottles.length){
          bottles=c.bottles.map(function(b){return"P"+b.qty+"×"+b.cnt}).join(" ");
        }
        var btnId="btn_"+c.code;
        var right="";
        if(ht){
          right='<div style="display:flex;align-items:center;gap:5px;">'
            +'<input class="keep-input" id="keep_'+c.code+'" type="number" value="" min="0" step="0.1" placeholder="남김">'
            +"<button class=\"cust-btn\" onclick=\"processOne('"+c.code+"','"+c.name+"')\">처리</button></div>";
        }else{
          right='<div style="display:flex;align-items:center;gap:5px;">'
            +'<input class="keep-input" id="keep_'+c.code+'" type="number" value="" min="0" step="0.1" placeholder="남김" oninput="toggleDoneBtn(\''+c.code+'\')">'
            +'<button class="cust-btn" id="'+btnId+'" style="background:#e2e8f0;color:#94a3b8;box-shadow:none;pointer-events:none;" onclick="processOne(\''+c.code+"','"+c.name+"')\">처리</button></div>";
        }
        var pj=c.p_jan||0;
        var bj=c.b_jan||0;
        var info='<span>잔량 <b style="color:#d97706;">'+pj.toFixed(1)+'</b></span>';
        if(bj>0) info+=' · <span>부탄 <b style="color:#dc2626;">'+bj.toFixed(1)+'</b></span>';
        if(c.count>0){
          info+=' · <span>대상 <b style="color:#6366f1;">'+c.count+'</b>건 <b style="color:#6366f1;">'+c.total_jan.toFixed(1)+'</b></span>';
        }
        return '<div class="cust-row">'
          +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">'
          +'<div style="display:flex;align-items:baseline;gap:8px;">'
          +'<div class="cust-name" style="cursor:pointer;text-decoration:underline;text-decoration-color:#cbd5e1;" onclick="showDetail(\''+c.code+"','"+c.name+"')\">"+c.name+'</div>'
          +'<span style="font-size:10px;color:#94a3b8;font-weight:500;">'+(bottles||"")+'</span>'
          +'</div>'+right+'</div>'
          +'<div class="cust-meta">'+info+'</div></div>';
      }
      var html="";
      if(active.length){
        html+='<div style="font-size:11px;font-weight:800;color:#6366f1;margin-bottom:6px;letter-spacing:0.5px;cursor:pointer;display:flex;align-items:center;gap:6px;" onclick="toggleSection(\'secActive\')">'
          +'<span id="secActiveArrow" style="transition:transform 0.2s;">▼</span>처리 대상 '+active.length+'개</div>'
          +'<div id="secActive">';
        for(var i=0;i<active.length;i++) html+=renderRow(active[i],true);
        html+='</div>';
      }
      if(done.length){
        html+='<div style="font-size:11px;font-weight:800;color:#94a3b8;margin:12px 0 6px;letter-spacing:0.5px;cursor:pointer;display:flex;align-items:center;gap:6px;" onclick="toggleSection(\'secDone\')">'
          +'<span id="secDoneArrow" style="transition:transform 0.2s;">▼</span>처리 완료 '+done.length+'개</div>'
          +'<div id="secDone">';
        for(var i=0;i<done.length;i++) html+=renderRow(done[i],false);
        html+='</div>';
      }
      el.innerHTML=html;
      addLog(custs.length+"개 거래처, "+total+"건 조회","info");
    });
  });
}

var _detailCache={};
function showDetail(code,name){
  if(_detailCache[code]){
    renderDetail(name,_detailCache[code]);
    refreshDetail(code,name);
    return;
  }
  var body=document.getElementById("detailBody");
  body.innerHTML='<div class="empty"><div class="spinner"></div>불러오는 중...</div>';
  document.getElementById("detailModal").style.display="flex";
  document.getElementById("detailTitle").textContent=name;
  refreshDetail(code,name);
}
function refreshDetail(code,name){
  sendCmd("detail",{code:code}).then(function(id){
    if(!id)return;
    waitResult(id,10000).then(function(r){
      if(!r||r.error)return;
      _detailCache[code]=r.items||[];
      renderDetail(name,_detailCache[code]);
    });
  });
}
function renderDetail(name,items){
  var modal=document.getElementById("detailModal");
  var body=document.getElementById("detailBody");
  document.getElementById("detailTitle").textContent=name;
  modal.style.display="flex";
  if(!items||!items.length){body.innerHTML='<div class="empty">용기 데이터가 없습니다</div>';return}
  var rng=getRange();
  var h='<div style="position:sticky;top:-1px;background:white;z-index:1;border-bottom:2px solid #e2e8f0;padding:8px 4px;margin-top:-1px;display:flex;font-size:12px;color:#94a3b8;font-weight:700;">'
    +'<span style="width:18%;">번호</span><span style="width:18%;">용기</span><span style="width:22%;">잔량</span><span style="width:22%;">충전량</span><span style="width:20%;">시간</span></div>'
    +'<table style="width:100%;border-collapse:collapse;font-size:12px;">';
  for(var i=0;i<items.length;i++){
    var d=items[i];
    var isTarget=d.jan>0&&d.jan>=rng.min&&d.jan<=rng.max;
    var color=d.jan>0?(isTarget?"#6366f1":"#d97706"):(d.jan<0?"#dc2626":"#94a3b8");
    var bg=isTarget?"#f5f3ff":"";
    h+='<tr style="border-bottom:1px solid #f1f5f9;'+(bg?'background:'+bg:'')+'">'
      +'<td style="padding:8px 4px;color:#94a3b8;width:18%;">#'+d.no+'</td>'
      +'<td style="font-weight:700;width:18%;">P'+d.qty+'</td>'
      +'<td style="font-weight:700;color:'+color+';width:22%;">'+d.jan.toFixed(3)+'</td>'
      +'<td style="color:#64748b;width:22%;">'+d.fill.toFixed(1)+'</td>'
      +'<td style="color:#94a3b8;font-size:10px;width:20%;">'+d.time+'</td></tr>';
  }
  h+='</table>';
  body.innerHTML=h;
}
function closeDetail(){document.getElementById("detailModal").style.display="none";}

function toggleSection(id){
  var el=document.getElementById(id);
  var arrow=document.getElementById(id+"Arrow");
  if(!el)return;
  if(el.style.display==="none"){
    el.style.display="block";
    if(arrow)arrow.style.transform="rotate(0deg)";
  }else{
    el.style.display="none";
    if(arrow)arrow.style.transform="rotate(-90deg)";
  }
}

function toggleDoneBtn(code){
  var inp=document.getElementById("keep_"+code);
  var btn=document.getElementById("btn_"+code);
  if(!inp||!btn)return;
  var val=parseFloat(inp.value);
  if(val>0){
    btn.style.background="linear-gradient(135deg,#22c55e,#16a34a)";
    btn.style.color="white";
    btn.style.boxShadow="0 2px 8px rgba(34,197,94,0.3)";
    btn.style.pointerEvents="auto";
  }else{
    btn.style.background="#e2e8f0";
    btn.style.color="#94a3b8";
    btn.style.boxShadow="none";
    btn.style.pointerEvents="none";
  }
}

var _processing=false;
function processOne(code,name){
  if(_processing)return;
  var keepEl=document.getElementById("keep_"+code);
  var keep=keepEl?parseFloat(keepEl.value)||0:0;
  var tag=keep>0?" ("+keep+" 남김)":"";
  if(!confirm(name+tag+" 처리할까요?"))return;
  _processing=true;
  showToast(name+" 처리 중...");
  addLog(name+" 처리 시작"+tag,"info");
  var rng=getRange();
  sendCmd("config",{min:rng.min,max:rng.max}).then(function(){
    return sendCmd("process_one",{code:code,name:name,keep:keep});
  }).then(function(id){
    if(!id){_processing=false;return}
    return waitResult(id);
  }).then(function(r){
    if(!r){showToast("응답 없음","err");_processing=false;return}
    if(r.error){showToast(r.error,"err");addLog("오류: "+r.error,"err");_processing=false;return}
    showToast(name+" "+r.count+"건 완료","ok");
    if(r.details){
      for(var i=0;i<r.details.length;i++){
        var d=r.details[i];
        addLog("  #"+d.no+" P"+parseInt(d.qty)+" "+d.jan+" → 0","ok");
      }
    }
    if(r.before_total!==undefined)addLog("  잔량 "+r.before_total+" → "+r.after_total,"ok");
    addLog(name+" "+r.count+"건 처리 완료","ok");
    _processing=false;
    loadList();
  });
}

function processAll(){
  if(_processing)return;
  if(!confirm("전체 거래처를 일괄 처리할까요?"))return;
  _processing=true;
  showToast("전체 처리 중...");
  addLog("전체 처리 시작","info");
  var rng=getRange();
  sendCmd("config",{min:rng.min,max:rng.max}).then(function(){
    return sendCmd("process_all");
  }).then(function(id){
    if(!id){_processing=false;return}
    return waitResult(id,30000);
  }).then(function(r){
    if(!r){showToast("응답 없음","err");_processing=false;return}
    if(r.error){showToast(r.error,"err");_processing=false;return}
    if(r.customers){
      for(var i=0;i<r.customers.length;i++){
        var c=r.customers[i];
        addLog("  "+c.name+" "+c.count+"건 ("+c.total.toFixed(1)+")","ok");
      }
    }
    showToast("전체 "+r.count+"건 완료","ok");
    addLog("전체 "+r.count+"건 · "+(r.total_jan||0).toFixed(1)+" 제거 완료","ok");
    _processing=false;
    loadList();
  });
}

var _lastAlive=false,_failCnt=0,_okCnt=0;
function pollStatus(){
  fetch(fb("proc_status.json")).then(function(r){return r.json()}).then(function(pd){
    var now=Math.floor(Date.now()/1000);
    var alive=pd&&pd.status==="on"&&pd.ts&&(now-pd.ts)<60;
    _failCnt=0;
    if(alive){_okCnt++;_lastAlive=true;}
    else{_okCnt=0;_lastAlive=false;}
    updateStatus();
  }).catch(function(){
    _failCnt++;
    if(_failCnt>=5){_lastAlive=false;_okCnt=0;updateStatus();}
  });
}
function updateStatus(){
  document.getElementById("statusDot").className="dot"+(_lastAlive?" on":"");
  document.getElementById("statusText").textContent=_lastAlive?"연결됨":"오프라인";
}

addLog("앱 시작","info");
pollStatus();
setInterval(pollStatus,10000);
loadList();
</script>
